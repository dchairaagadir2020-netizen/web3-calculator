<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crypto Converter Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white min-h-screen flex items-center justify-center p-4">

    <div class="bg-slate-800 p-8 rounded-2xl shadow-2xl w-full max-w-md border border-slate-700">
        <h1 class="text-2xl font-bold mb-6 text-center text-blue-400">Crypto Calculator</h1>
        
        <div class="mb-4">
            <label class="block text-sm mb-2">Amount</label>
            <input type="number" id="amount" value="1" class="w-full p-3 rounded-lg bg-slate-700 border border-slate-600 focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>

        <div class="mb-6">
            <label class="block text-sm mb-2">Select Currency</label>
            <select id="crypto" class="w-full p-3 rounded-lg bg-slate-700 border border-slate-600">
                <option value="bitcoin">Bitcoin (BTC)</option>
                <option value="ethereum">Ethereum (ETH)</option>
                <option value="solana">Solana (SOL)</option>
            </select>
        </div>

        <button onclick="calculate()" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-lg transition duration-300">
            Convert to USD
        </button>

        <div id="result" class="mt-6 text-center text-xl font-semibold text-emerald-400">
            Result: --
        </div>
    </div>

    <script>
        async function calculate() {
            const amount = document.getElementById('amount').value;
            const crypto = document.getElementById('crypto').value;
            const resDiv = document.getElementById('result');
            
            resDiv.innerText = "Loading...";
            
            try {
                const response = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${crypto}&vs_currencies=usd`);
                const data = await response.json();
                const price = data[crypto].usd;
                const total = amount * price;
                resDiv.innerText = `${amount} ${crypto.toUpperCase()} = $${total.toLocaleString()} USD`;
            } catch (error) {
                resDiv.innerText = "Error fetching data!";
            }
        }
    </script>
</body>
</html>
