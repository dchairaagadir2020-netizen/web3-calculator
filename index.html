<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wifak - Crypto Calculator</title>

<style>
body {
  margin:0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #0f172a, #020617);
  color: white;
  text-align:center;
}

.container {
  max-width:400px;
  margin:80px auto;
  background: rgba(255,255,255,0.05);
  backdrop-filter: blur(10px);
  padding:25px;
  border-radius:20px;
  box-shadow:0 0 20px rgba(0,255,255,0.2);
}

.logo {
  font-size:28px;
  font-weight:bold;
  color:#00ffff;
  margin-bottom:10px;
}

.subtitle {
  font-size:14px;
  color:#aaa;
  margin-bottom:20px;
}

input {
  width:90%;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  border:none;
  outline:none;
  font-size:16px;
}

button {
  width:95%;
  padding:12px;
  background:linear-gradient(90deg,#00ffff,#007cf0);
  border:none;
  border-radius:10px;
  color:black;
  font-weight:bold;
  cursor:pointer;
  margin-top:10px;
  transition:0.3s;
}

button:hover {
  transform:scale(1.05);
}

.result {
  margin-top:20px;
  font-size:18px;
  color:#00ffff;
}

.footer {
  margin-top:20px;
  font-size:12px;
  color:#666;
}
</style>
</head>

<body>

<div class="container">

<div class="logo">🚀 Wifak</div>
<div class="subtitle">Crypto Profit Calculator</div>

<input id="buy" placeholder="Buy Price ($)">
<input id="sell" placeholder="Sell Price ($)">
<input id="amount" placeholder="Amount">

<button onclick="calc()">Calculate Profit</button>

<div class="result" id="result"></div>

<div class="footer">© 2026 Wifak</div>

</div>

<script>
function calc() {

let buy = parseFloat(document.getElementById("buy").value);
let sell = parseFloat(document.getElementById("sell").value);
let amount = parseFloat(document.getElementById("amount").value);

if(!buy || !sell || !amount){
document.getElementById("result").innerHTML = "⚠️ Fill all fields";
return;
}

let profit = (sell - buy) * amount;
let percent = ((sell - buy) / buy) * 100;

document.getElementById("result").innerHTML =
"💰 Profit: $" + profit.toFixed(2) +
"<br>📊 ROI: " + percent.toFixed(2) + "%";
}
</script>

</body>
</html>
