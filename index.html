<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wifak - Crypto Hub</title>

<style>
body{
margin:0;
font-family:Arial;
background: radial-gradient(circle at top,#0f172a,#020617);
color:white;
text-align:center;
}

header{
padding:20px;
font-size:30px;
font-weight:bold;
color:#00ffff;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:15px;
padding:20px;
max-width:900px;
margin:auto;
}

.card{
background:rgba(255,255,255,0.05);
padding:15px;
border-radius:15px;
transition:0.3s;
box-shadow:0 0 15px rgba(0,255,255,0.1);
}

.card:hover{
transform:scale(1.05);
}

.price{
color:#00ffff;
margin-top:10px;
}

.calc{
max-width:400px;
margin:40px auto;
padding:20px;
background:rgba(255,255,255,0.05);
border-radius:20px;
box-shadow:0 0 20px rgba(0,255,255,0.2);
}

input{
width:90%;
padding:10px;
margin:8px 0;
border-radius:10px;
border:none;
outline:none;
}

button{
width:95%;
padding:10px;
background:#00ffff;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.result{
margin-top:15px;
color:#00ffff;
font-size:18px;
}
</style>
</head>

<body>

<header>🚀 WIFAK CRYPTO HUB</header>

<!-- CRYPTO SECTION -->
<div class="container">

<div class="card">₿ Bitcoin<div class="price">$43,000</div></div>
<div class="card">Ξ Ethereum<div class="price">$2,300</div></div>
<div class="card">🟡 BNB<div class="price">$310</div></div>
<div class="card">💧 XRP<div class="price">$0.52</div></div>
<div class="card">💎 Solana<div class="price">$98</div></div>
<div class="card">🐕 Dogecoin<div class="price">$0.08</div></div>

</div>

<!-- CALCULATOR -->
<div class="calc">

<h2>💰 Profit Calculator</h2>

<input id="buy" placeholder="Buy Price">
<input id="sell" placeholder="Sell Price">
<input id="amount" placeholder="Amount">

<button onclick="calc()">Calculate</button>

<div class="result" id="result"></div>

</div>

<script>
function calc(){
let buy = parseFloat(document.getElementById("buy").value);
let sell = parseFloat(document.getElementById("sell").value);
let amount = parseFloat(document.getElementById("amount").value);

if(!buy || !sell || !amount){
document.getElementById("result").innerHTML = "⚠️ Fill all fields";
return;
}

let profit = (sell - buy) * amount;
let roi = ((sell - buy) / buy) * 100;

document.getElementById("result").innerHTML =
"💰 Profit: $" + profit.toFixed(2) +
"<br>📊 ROI: " + roi.toFixed(2) + "%";
}
</script>

</body>
</html>
