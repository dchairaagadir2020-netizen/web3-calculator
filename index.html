<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WIFAK | Crypto Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .gold-gradient { background: linear-gradient(to right, #bf953f, #fcf6ba, #b38728, #fbf5b7, #aa771c); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.1); }
    </style>
</head>
<body class="bg-black text-white min-h-screen flex items-center justify-center p-6">

    <div class="glass p-10 rounded-3xl shadow-2xl w-full max-w-lg">
        <div class="text-center mb-8">
            <h1 class="text-4xl font-extrabold tracking-widest gold-gradient">WIFAK</h1>
            <p class="text-gray-500 text-xs uppercase tracking-[0.2em] mt-2">Crypto Finance Terminal</p>
        </div>
        
        <div class="space-y-6">
            <div>
                <label class="block text-gray-400 text-xs uppercase mb-2">Amount</label>
                <input type="number" id="amount" value="1" oninput="calculate()" class="w-full bg-transparent border-b border-gray-700 p-2 text-2xl focus:border-yellow-600 outline-none transition">
            </div>

            <div>
                <label class="block text-gray-400 text-xs uppercase mb-2">Select Asset</label>
                <select id="crypto" onchange="calculate()" class="w-full bg-slate-900 border border-gray-700 p-3 rounded-lg outline-none cursor-pointer">
                    <option value="bitcoin">Bitcoin (BTC)</option>
                    <option value="ethereum">Ethereum (ETH)</option>
                    <option value="solana">Solana (SOL)</option>
                    <option value="binancecoin">BNB</option>
                </select>
            </div>
        </div>

        <div class="mt-10 text-center">
            <div id="result" class="text-5xl font-light text-white">$0.00</div>
            <p class="text-yellow-600 mt-2 text-sm italic">Live Market Data</p>
        </div>
    </div>

    <script>
        async function calculate() {
            const amount = document.getElementById('amount').value;
            const crypto = document.getElementById('crypto').value;
            const resDiv = document.getElementById('result');
            
            try {
                const response = await fetch(`https://api.coingecko.com/api/v3/simple/price?ids=${crypto}&vs_currencies=usd`);
                const data = await response.json();
                const price = data[crypto].usd;
                resDiv.innerText = `$${(amount * price).toLocaleString(undefined, {minimumFractionDigits: 2})}`;
            } catch (error) {
                resDiv.innerText = "Error";
            }
        }
        // Run once on load
        calculate();
    </script>
</body>
</html>
