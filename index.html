<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wifak - Crypto Dashboard</title>

<style>
body{
margin:0;
font-family:Arial;
background: radial-gradient(circle at top,#0f172a,#020617);
color:white;
text-align:center;
}

header{
padding:20px;
font-size:28px;
font-weight:bold;
color:#00ffff;
}

.container{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:15px;
padding:20px;
max-width:900px;
margin:auto;
}

.card{
background:rgba(255,255,255,0.05);
padding:15px;
border-radius:15px;
box-shadow:0 0 15px rgba(0,255,255,0.1);
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
box-shadow:0 0 25px rgba(0,255,255,0.3);
}

.price{
font-size:18px;
margin-top:10px;
color:#00ffff;
}

small{
color:#aaa;
}

footer{
margin-top:20px;
font-size:12px;
color:#666;
}
</style>
</head>

<body>

<header>🚀 WIFAK CRYPTO DASHBOARD</header>

<div class="container">

<div class="card">₿ Bitcoin<div class="price">$43,000</div><small>BTC</small></div>

<div class="card">Ξ Ethereum<div class="price">$2,300</div><small>ETH</small></div>

<div class="card">🟡 Binance Coin<div class="price">$310</div><small>BNB</small></div>

<div class="card">💧 Ripple<div class="price">$0.52</div><small>XRP</small></div>

<div class="card">💎 Solana<div class="price">$98</div><small>SOL</small></div>

<div class="card">🐕 Dogecoin<div class="price">$0.08</div><small>DOGE</small></div>

<div class="card">🌐 Cardano<div class="price">$0.45</div><small>ADA</small></div>

<div class="card">⚡ Polygon<div class="price">$0.90</div><small>MATIC</small></div>

</div>

<footer>© 2026 Wifak | Crypto Dashboard</footer>

</body>
</html>
